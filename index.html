<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Полимер: стеклообразование и плавление</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body { margin: 16px; font-family: system-ui, sans-serif; }
    main { margin-bottom: 24px; max-width: 800px; }
    #canvas-host { line-height: 0; }
    .control-panel {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .control-panel p { margin: 0; }
    #line-state {
      padding: 8px 12px;
      border-radius: 4px;
      color: #fff;
      font-size: 16px;
      line-height: 1.35;
    }
    #slider-wrap label { display: block; margin-bottom: 4px; font-size: 14px; }
  </style>
</head>
<body>
  <main>
    <div id="canvas-host"></div>
    <div class="control-panel">
      <p id="line-temp"></p>
      <p id="line-material"></p>
      <div id="line-state" role="status"></div>
      <div id="slider-wrap"></div>
      <div id="button-wrap"></div>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
